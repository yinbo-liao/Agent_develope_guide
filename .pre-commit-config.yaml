repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ["--maxkb=1000"]
      - id: detect-private-key
      - id: check-merge-conflict

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]

  - repo: local
    hooks:
      - id: security-firewall-test
        name: Test security firewall hook
        entry: python -m pytest tests/security/test_firewall.py -q
        language: system
        files: \.claude/hooks/security.*\.py$

      - id: agent-scope-check
        name: Validate agent scopes
        entry: python scripts/validate_agent_scopes.py
        language: system
        files: \.claude/agents/.*\.md$
