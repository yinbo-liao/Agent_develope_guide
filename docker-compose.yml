services:
  postgres:
    image: postgres:17-alpine
    container_name: aiwf-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-aiwf}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme_in_production}
      POSTGRES_DB: ${DB_NAME:-aiwf_dev}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-aiwf} -d ${DB_NAME:-aiwf_dev}"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: aiwf-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD:-changeme}
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - redis_data:/data

  opa:
    image: openpolicyagent/opa:0.68.0
    container_name: aiwf-opa
    restart: unless-stopped
    command:
      [
        "run",
        "--server",
        "--addr=0.0.0.0:8181",
        "--set=decision_logs.console=true",
        "/policies"
      ]
    ports:
      - "8181:8181"
    volumes:
      - ./infrastructure/opa:/policies:ro

  backend:
    build:
      context: ./api
      dockerfile: ../infrastructure/docker/api/Dockerfile.dev
    container_name: aiwf-backend
    restart: unless-stopped
    environment:
      ENVIRONMENT: development
      DEBUG: "true"
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-aiwf}:${DB_PASSWORD:-changeme_in_production}@postgres:5432/${DB_NAME:-aiwf_dev}
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
      OPA_URL: http://opa:8181
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-me}
      CORS_ORIGINS: '["http://localhost:5173","http://127.0.0.1:5173"]'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      opa:
        condition: service_started
    ports:
      - "8000:8000"
    volumes:
      - ./api:/app
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: ../infrastructure/docker/frontend/Dockerfile.dev
    container_name: aiwf-frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - backend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 5173

volumes:
  postgres_data:
  redis_data:
  frontend_node_modules:
